name: Build and deploy React app to Azure Web App - dhaanya-frontend

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'

      - name: Install & Build
        run: |
          cd frontend
          npm install --legacy-peer-deps
          CI=false npm run build

      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: react-build
          path: frontend/build

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download build
        uses: actions/download-artifact@v4
        with:
          name: react-build

      - name: Deploy to Azure
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'dhaanya-frontend'
          slot-name: 'Production'
          package: .
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_FRONTEND }}
